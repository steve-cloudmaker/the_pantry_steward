name: Sously
options:
  bundleIdPrefix: com.sously
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: YES
    DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
    MACCATALYST_DEPLOYMENT_TARGET: "14.0"
    ENABLE_PREVIEWS: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Sously:
    type: application
    platform: iOS
    sources:
      - path: Sously
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sously.app
        INFOPLIST_FILE: Sously/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sously/Resources/Sously.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets:
        - SouslyTests
        - SouslyUITests

  SouslyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SouslyTests
    dependencies:
      - target: Sously
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sously.app.tests
        GENERATE_INFOPLIST_FILE: YES

  SouslyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SouslyUITests
    dependencies:
      - target: Sously
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sously.app.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Sously:
    build:
      targets:
        Sously: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SouslyTests
        - SouslyUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
